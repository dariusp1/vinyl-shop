<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZU — TIWALINE FIFTH DREAM | 黑胶唱片店</title>
    <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
    <article class="record-page">
        <a href="../../" class="back-link">&larr; 返回目录</a>

        <div class="record-cover">
            <img
                src="../../assets/covers/iot87lp-iot-records-azu-tiwaline-fifth-dream-techno-eu2lp-un.jpg"
                alt="AZU — TIWALINE FIFTH DREAM"
                onerror="this.onerror=null;this.src='../../assets/covers/placeholder.svg';"
            >
        </div>

        <div class="record-meta">
            <h1 class="record-artist">AZU</h1>
            <h2 class="record-title">TIWALINE FIFTH DREAM</h2>
            <p class="price">¥204</p>
            <p class="record-description">AZU的电子音乐力作《Tiwaline Fifth Dream》，融合深邃的电子节奏与梦幻氛围，是一张沉浸式的双黑胶专辑。这张作品展现了艺术家对Techno音乐的创新诠释，适合电子音乐爱好者收藏。</p>
        </div>

        <div class="player-section">
            <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <button id="play-btn" class="play-button">&#9654; 试听 30秒</button>
            <audio id="audio" preload="none">
                <source src="../../audio/iot87lp-iot-records-azu-tiwaline-fifth-dream-techno-eu2lp-un.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="buy-section">
            <button class="buy-button">立即购买 / 联系我们</button>
            <div class="contact-qr">
                <p>扫码添加微信咨询</p>
                <img src="../../qr/shop-wechat.png" alt="微信二维码"
                     onerror="this.parentElement.innerHTML='<p>微信号: VINYL_SHOP</p>';">
            </div>
        </div>
    </article>

    <script src="../../assets/player.js"></script>
    <script>initPlayer();</script>
</body>
</html>
