<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navy Blue — Ways of Knowing | 黑胶唱片店</title>
    <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
    <article class="record-page">
        <a href="../../" class="back-link">&larr; 返回目录</a>

        <div class="record-cover">
            <img
                src="../../assets/covers/defb003760601-def-jam-recordings-navy-blue-ways-of-knowing-h.jpg"
                alt="Navy Blue — Ways of Knowing"
                onerror="this.onerror=null;this.src='../../assets/covers/placeholder.svg';"
            >
        </div>

        <div class="record-meta">
            <h1 class="record-artist">Navy Blue</h1>
            <h2 class="record-title">Ways of Knowing</h2>
            <dl class="meta-list">
                <dt>年份</dt><dd></dd>
                <dt>厂牌</dt><dd>Def Jam Recordings</dd>
                <dt>风格</dt><dd>Hip Hop</dd>
                <dt>品相</dt><dd><span class="badge"></span></dd>
                <dt>价格</dt><dd class="price">¥194</dd>
            </dl>
            <p class="record-description">Navy Blue是布鲁克林说唱艺术家Sage Elsesser的音乐项目，以其独特的嘻哈风格和深邃的音乐理念而闻名。《Ways of Knowing》是其黑胶唱片发行作品，展现了艺术家对hip-hop的个人诠释。</p>
        </div>

        <div class="player-section">
            <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <button id="play-btn" class="play-button">&#9654; 试听 30秒</button>
            <audio id="audio" preload="none">
                <source src="../../audio/defb003760601-def-jam-recordings-navy-blue-ways-of-knowing-h.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="buy-section">
            <button class="buy-button">立即购买 / 联系我们</button>
            <div class="contact-qr">
                <p>扫码添加微信咨询</p>
                <img src="../../qr/shop-wechat.png" alt="微信二维码"
                     onerror="this.parentElement.innerHTML='<p>微信号: VINYL_SHOP</p>';">
            </div>
        </div>
    </article>

    <script src="../../assets/player.js"></script>
    <script>initPlayer();</script>
</body>
</html>
