<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../assets/style.css">

<body>
    <article class="record-page">
        <a href="../../" class="back-link">&larr; 返回目录</a>

        <div class="record-cover">
            <img
                src="../../assets/covers/bf-7135-brainfeeder-thundercat-tame-impala-no-more-lies-rock.jpg"
                alt="Thundercat &amp; Tame Impala — No More Lies"
                onerror="this.onerror=null;this.src='../../assets/covers/placeholder.svg';"

        <div class="record-meta">
            <h1 class="record-artist">Thundercat &amp; Tame Impala</h1>

        <div class="player-section">
            <div id="progress-bar" class="progress-bar">

            </div>
            <button id="play-btn" class="play-button">&#9654; 试听 30秒</button>

                <source src="../../audio/bf-7135-brainfeeder-thundercat-tame-impala-no-more-lies-rock.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="buy-section">
            <button class="buy-button">立即购买 / 联系我们</button>
            <div class="contact-qr">
                <p>扫码添加微信咨询</p>
                <img src="../../qr/shop-wechat.png" alt="微信二维码"

    <script src="../../assets/player.js"></script>
