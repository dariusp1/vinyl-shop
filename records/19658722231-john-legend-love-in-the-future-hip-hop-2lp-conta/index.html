<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John Legend — Love in the Future | 黑胶唱片店</title>
    <link rel="stylesheet" href="../../assets/style.css">
</head>
<body>
    <article class="record-page">
        <a href="../../" class="back-link">&larr; 返回目录</a>

        <div class="record-cover">
            <img
                src="../../assets/covers/19658722231-john-legend-love-in-the-future-hip-hop-2lp-conta.jpg"
                alt="John Legend — Love in the Future"
                onerror="this.onerror=null;this.src='../../assets/covers/placeholder.svg';"
            >
        </div>

        <div class="record-meta">
            <h1 class="record-artist">John Legend</h1>
            <h2 class="record-title">Love in the Future</h2>
            <dl class="meta-list">
                <dt>年份</dt><dd></dd>
                <dt>厂牌</dt><dd></dd>
                <dt>风格</dt><dd>Hip Hop</dd>
                <dt>品相</dt><dd><span class="badge"></span></dd>
                <dt>价格</dt><dd class="price">¥130</dd>
            </dl>
            <p class="record-description">约翰·传奇的专辑，收录众多热门歌曲，包括由坎耶·韦斯特制作的鲍比·卡德威尔经典歌曲《睁开你的眼睛》的翻唱版本。</p>
        </div>

        <div class="player-section">
            <div id="progress-bar" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <button id="play-btn" class="play-button">&#9654; 试听 30秒</button>
            <audio id="audio" preload="none">
                <source src="../../audio/19658722231-john-legend-love-in-the-future-hip-hop-2lp-conta.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="buy-section">
            <button class="buy-button">立即购买 / 联系我们</button>
            <div class="contact-qr">
                <p>扫码添加微信咨询</p>
                <img src="../../qr/shop-wechat.png" alt="微信二维码"
                     onerror="this.parentElement.innerHTML='<p>微信号: VINYL_SHOP</p>';">
            </div>
        </div>
    </article>

    <script src="../../assets/player.js"></script>
    <script>initPlayer();</script>
</body>
</html>
