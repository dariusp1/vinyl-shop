<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#1a1a1a"/>
  <!-- Outer disc -->
  <circle cx="150" cy="150" r="130" fill="#111"/>
  <!-- Grooves -->
  <circle cx="150" cy="150" r="120" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="150" cy="150" r="110" fill="none" stroke="#1d1d1d" stroke-width="0.5"/>
  <circle cx="150" cy="150" r="100" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="150" cy="150" r="90" fill="none" stroke="#1d1d1d" stroke-width="0.5"/>
  <circle cx="150" cy="150" r="80" fill="none" stroke="#222" stroke-width="0.5"/>
  <circle cx="150" cy="150" r="70" fill="none" stroke="#1d1d1d" stroke-width="0.5"/>
  <circle cx="150" cy="150" r="60" fill="none" stroke="#222" stroke-width="0.5"/>
  <!-- Highlight arc for 3D feel -->
  <path d="M60,100 A100,100 0 0,1 200,55" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="30"/>
  <!-- Label -->
  <circle cx="150" cy="150" r="42" fill="#c0392b"/>
  <circle cx="150" cy="150" r="40" fill="#e74c3c"/>
  <!-- Label shine -->
  <ellipse cx="140" cy="140" rx="25" ry="18" fill="rgba(255,255,255,0.1)" transform="rotate(-20 140 140)"/>
  <!-- Spindle hole -->
  <circle cx="150" cy="150" r="5" fill="#1a1a1a"/>
  <!-- Label text -->
  <text x="150" y="146" text-anchor="middle" font-family="serif" font-size="11" fill="rgba(255,255,255,0.8)">VINYL</text>
  <text x="150" y="160" text-anchor="middle" font-family="sans-serif" font-size="7" fill="rgba(255,255,255,0.5)">33 RPM</text>
</svg>
