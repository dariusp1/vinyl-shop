<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑胶唱片店 — Vinyl Shop</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header class="site-header">
        <img src="assets/logo.jpeg" alt="QSNS" class="site-logo">
        <p class="tagline">精选黑胶 &middot; 聆听经典</p>
    </header>

    <main class="catalog">
        <ol id="catalog-list" class="catalog-list">
            <!-- List rendered by JS from catalog.json -->
        </ol>
        <p id="catalog-empty" class="catalog-empty" hidden>暂无唱片，敬请期待。</p>
        <p id="catalog-error" class="catalog-error" hidden>加载失败，请刷新重试。</p>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 黑胶唱片店</p>
    </footer>

    <script>
    (function () {
        var list = document.getElementById('catalog-list');
        var emptyMsg = document.getElementById('catalog-empty');
        var errorMsg = document.getElementById('catalog-error');

        fetch('data/catalog.json')
            .then(function (res) {
                if (!res.ok) throw new Error(res.status);
                return res.json();
            })
            .then(function (catalog) {
                if (!catalog.length) {
                    emptyMsg.hidden = false;
                    return;
                }
                catalog.sort(function (a, b) {
                    return (a.artist_clean || a.artist || '').localeCompare(b.artist_clean || b.artist || '');
                });
                var html = '';
                for (var i = 0; i < catalog.length; i++) {
                    var r = catalog[i];
                    html += '<li class="catalog-row">'
                        + '<a href="records/' + encodeURIComponent(r.slug) + '/">'
                        + '<span class="row-artist">' + esc(r.artist_clean || r.artist) + '</span>'
                        + '<span class="row-title">' + esc(r.title_clean || r.title) + '</span>'
                        + '</a>'
                        + '<span class="row-price">' + esc(r.price) + '</span>'
                        + '</li>';
                }
                list.innerHTML = html;
            })
            .catch(function () {
                errorMsg.hidden = false;
            });

        function esc(s) {
            var el = document.createElement('span');
            el.textContent = s || '';
            return el.innerHTML;
        }
    })();
    </script>
</body>
</html>
